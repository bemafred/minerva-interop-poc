name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── macOS: Build + Metal bridge + Run ──────────────────────────────
  macos:
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Metal bridge
        run: |
          cd native/metal
          make

      - name: Build .NET solution
        run: dotnet build -c Release

      - name: Install Metal bridge
        run: |
          cp native/metal/libmetal_bridge.dylib src/Minerva.Interop.Poc/bin/Release/net10.0/
          cp native/metal/kernels.metallib src/Minerva.Interop.Poc/bin/Release/net10.0/ || true

      - name: Run POC
        run: dotnet run --project src/Minerva.Interop.Poc -c Release --no-build

  # ─── Linux: Build + Run (CPU BLAS only, no CUDA in CI) ─────────────
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Build .NET solution
        run: dotnet build -c Release

      - name: Run POC (CPU only — no CUDA in CI)
        run: dotnet run --project src/Minerva.Interop.Poc -c Release

  # ─── Windows: Build + Run (CPU BLAS only) ──────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build .NET solution
        run: dotnet build -c Release

      # OpenBLAS on Windows — download prebuilt binary and copy to build output
      - name: Install OpenBLAS
        shell: powershell
        run: |
          $url = "https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.28/OpenBLAS-0.3.28-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile openblas.zip
          Expand-Archive openblas.zip -DestinationPath openblas
          Copy-Item openblas/bin/libopenblas.dll src/Minerva.Interop.Poc/bin/Release/net10.0/

      - name: Run POC
        run: dotnet run --project src/Minerva.Interop.Poc -c Release --no-build
